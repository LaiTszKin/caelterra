meta:
  title: Project architecture  (+ codegraph integration overlay)
  summary: >
    完整 C4 架構圖：eval 評測系統 (8 features) + codegraph 程式碼分析 (1 feature, 3 submodules)。 外部 actor: Judge
    Model API, GitHub Actions CI, Developer, Skill Files, @colbymchenry/codegraph (npm),
    @laitszkin/tool-registry, @laitszkin/tui。 Eval 管線包含完整資料流: CLI → Executor → Scorer → Reporter →
    CI Gate。
  updatedAt: '2026-06-17T07:48:03.913Z'
actors:
  - id: judge-model-api
    label: Judge Model API
  - id: github-actions
    label: GitHub Actions CI
  - id: user-dev
    label: Developer
  - id: skill-files
    label: Skill Files (SKILL.md, scripts/, references/, assets/)
  - id: codegraph-npm
    label: '@colbymchenry/codegraph npm package'
  - id: tool-registry
    label: Tool Registry (@laitszkin/tool-registry)
  - id: tui-lib
    label: TUI Library (@laitszkin/tui)
features:
  - codegraph
  - eval-optimizer
  - eval-cli
  - eval-ci-gate
  - eval-isolation
  - eval-question
  - eval-executor
  - eval-scorer
  - eval-reporter
  - cli-dispatch
  - tool-registry
  - tool-utils
  - terminal-ui
  - quality-gate
edges:
  - id: cg-e-001
    from:
      feature: codegraph
      submodule: cg-lifecycle
    to:
      feature: codegraph
      submodule: cg-discovery
    kind: data-row
    label: survey/list-apis 依賴已索引的資料庫
  - id: cg-e-002
    from:
      feature: codegraph
      submodule: cg-discovery
    to:
      feature: codegraph
      submodule: cg-validation
    kind: data-row
    label: verify 使用 discovery 的搜尋能力
  - id: cg-e-003
    from:
      feature: codegraph
      submodule: cg-lifecycle
    to:
      feature: eval-cli
    kind: call
    label: codegraph init --index 與 eval-cli 共用 CLI 工具基礎架構
  - id: eval-cli-exec
    from:
      feature: eval-cli
      submodule: cli-handler
    to:
      feature: eval-executor
      submodule: trace-recorder
    kind: call
    label: evalHandler 觸發 runSingleTest
  - id: eval-exec-iso
    from:
      feature: eval-executor
      submodule: trace-recorder
    to:
      feature: eval-isolation
      submodule: tool-dispatcher
    kind: call
    label: 執行隔離環境中的工具調用
  - id: eval-exec-scorer
    from:
      feature: eval-executor
      submodule: trace-recorder
    to:
      feature: eval-scorer
      submodule: judge-prompt-builder
    kind: data-row
    label: trace events 送入評分
  - id: eval-scorer-reporter
    from:
      feature: eval-scorer
    to:
      feature: eval-reporter
    kind: data-row
    label: ScoreResult 送入報告組合
  - id: eval-exec-optimizer
    from:
      feature: eval-executor
    to:
      feature: eval-optimizer
    kind: data-row
    label: 執行結果觸發優化
  - id: eval-cli-ci
    from:
      feature: eval-cli
    to:
      feature: eval-ci-gate
    kind: call
    label: CI 模式下觸發 PR 回報
  - id: cli-edge-001
    from:
      feature: cli-dispatch
      submodule: arg-parser
    to:
      feature: tool-registry
      submodule: registry-core
    kind: call
    label: run() calls runTool()
  - id: cli-edge-002
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: banner-display
    kind: call
    label: install summary uses banner
  - id: cli-edge-003
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: interactive-prompts
    kind: call
    label: install prompts use inquirer
  - id: cli-edge-004
    from:
      feature: cli-dispatch
      submodule: help-builder
    to:
      feature: terminal-ui
      submodule: banner-display
    kind: call
    label: help text uses buildBanner
  - id: cli-edge-005
    from:
      feature: cli-dispatch
      submodule: help-builder
    to:
      feature: tool-registry
      submodule: formatter
    kind: call
    label: help text uses formatToolList
  - id: cli-edge-006
    from:
      feature: cli-dispatch
      submodule: tool-discovery
    to:
      feature: tool-registry
      submodule: registry-core
    kind: call
    label: registerAllTools calls registerTool
  - id: cli-edge-007
    from:
      feature: cli-dispatch
      submodule: update-checker
    to:
      feature: terminal-ui
      submodule: terminal-detection
    kind: call
    label: update check uses isInteractive
  - id: cli-edge-008
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: terminal-detection
    kind: call
