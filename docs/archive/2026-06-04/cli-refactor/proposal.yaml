# proposal.yaml — CLI infrastructure architecture (refactoring target)
# Generated by `apltk architecture template`, populated manually.
#
# This proposal adds the core CLI infrastructure features to the C4 atlas.
# These packages exist in the codebase but were not previously modeled.

features:
  # ──────────────────────────────────────────────────────────────────────
  # Feature: CLI Dispatch & Install Engine
  # Package: packages/cli
  # ──────────────────────────────────────────────────────────────────────
  - slug: cli-dispatch
    title: "CLI Dispatch and Install Engine"
    action: add
    story: >
      CLI entry point providing argument parsing (parseArguments), command dispatch
      (install/uninstall/tool/help), and the install/uninstall orchestration engine
      (syncToolkitHome, installLinks, uninstallSkills, manifest management).
    submodules:
      - slug: arg-parser
        title: "Argument Parser"
        refs:
          - "packages/cli/index.ts:parseArguments"
        functions:
          - name: parseArguments
            file: "packages/cli/index.ts"
          - name: run
            file: "packages/cli/index.ts"

      - slug: help-builder
        title: "Help Text Generator"
        refs:
          - "packages/cli/index.ts:buildHelpText"
          - "packages/cli/index.ts:buildInstallHelpText"
          - "packages/cli/index.ts:buildUninstallHelpText"
          - "packages/cli/index.ts:buildToolsHelp"
        functions:
          - name: buildHelpText
            file: "packages/cli/index.ts"
          - name: buildInstallHelpText
            file: "packages/cli/index.ts"
          - name: buildUninstallHelpText
            file: "packages/cli/index.ts"
          - name: buildToolsHelp
            file: "packages/cli/index.ts"

      - slug: installer-core
        title: "Install/Uninstall Engine"
        refs:
          - "packages/cli/installer.ts:installLinks"
          - "packages/cli/installer.ts:syncToolkitHome"
          - "packages/cli/installer.ts:uninstallSkills"
          - "packages/cli/installer.ts:getTargetRoots"
          - "packages/cli/installer.ts:writeManifest"
        functions:
          - name: resolveToolkitHome
            file: "packages/cli/installer.ts"
          - name: normalizeModes
            file: "packages/cli/installer.ts"
          - name: listSkillNames
            file: "packages/cli/installer.ts"
          - name: syncToolkitHome
            file: "packages/cli/installer.ts"
          - name: installLinks
            file: "packages/cli/installer.ts"
          - name: uninstallSkills
            file: "packages/cli/installer.ts"
          - name: writeManifest
            file: "packages/cli/installer.ts"
          - name: getTargetRoots
            file: "packages/cli/installer.ts"
          - name: readManifest
            file: "packages/cli/installer.ts"

      - slug: tool-discovery
        title: "Tool Discovery & Registration"
        refs:
          - "packages/cli/tool-registration.ts"
        functions:
          - name: registerAllTools
            file: "packages/cli/tool-registration.ts"
          - name: isKnownToolName
            file: "packages/cli/tool-registration.ts"

      - slug: update-checker
        title: "NPM Update Checker"
        refs:
          - "packages/cli/updater.ts:checkForPackageUpdate"
          - "packages/cli/updater.ts:execCommand"
        functions:
          - name: checkForPackageUpdate
            file: "packages/cli/updater.ts"
          - name: compareVersions
            file: "packages/cli/updater.ts"
          - name: execCommand
            file: "packages/cli/updater.ts"

  # ──────────────────────────────────────────────────────────────────────
  # Feature: Tool Registry
  # Package: packages/tool-registry
  # ──────────────────────────────────────────────────────────────────────
  - slug: tool-registry
    title: "Tool Registry"
    action: add
    story: >
      Central in-memory registry of ToolDefinition entries. Supports
      register/get/list/runTool and provides formatting for tool listings
      and discovery help text.
    submodules:
      - slug: registry-core
        title: "Registry Core"
        refs:
          - "packages/tool-registry/registry.ts"
        functions:
          - name: registerTool
            file: "packages/tool-registry/registry.ts"
          - name: getTool
            file: "packages/tool-registry/registry.ts"
          - name: listTools
            file: "packages/tool-registry/registry.ts"
          - name: runTool
            file: "packages/tool-registry/registry.ts"

      - slug: formatter
        title: "Tool List Formatter"
        refs:
          - "packages/tool-registry/registry.ts:formatToolList"
          - "packages/tool-registry/registry.ts:buildToolDiscoveryHelp"
        functions:
          - name: formatToolList
            file: "packages/tool-registry/registry.ts"
          - name: buildToolDiscoveryHelp
            file: "packages/tool-registry/registry.ts"

  # ──────────────────────────────────────────────────────────────────────
  # Feature: Tool Utilities
  # Package: packages/tool-utils
  # ──────────────────────────────────────────────────────────────────────
  - slug: tool-utils
    title: "Tool Utilities"
    action: add
    story: >
      Shared utilities consumed by tools: timestamp parsing/filtering for
      log analysis, skill directory discovery, and (after refactoring)
      cross-platform abstraction adapter and standardized error types.
    submodules:
      - slug: log-utils
        title: "Log Parsing Utilities"
        refs:
          - "packages/tool-utils/log-utils.ts"
        functions:
          - name: extractTimestamp
            file: "packages/tool-utils/log-utils.ts"
          - name: parseCliTimestamp
            file: "packages/tool-utils/log-utils.ts"
          - name: inWindow
            file: "packages/tool-utils/log-utils.ts"
          - name: iterInputLines
            file: "packages/tool-utils/log-utils.ts"

      - slug: skill-discovery
        title: "Skill Discovery"
        refs:
          - "packages/tool-utils/skill-discovery.ts"
        functions:
          - name: iterSkillDirs
            file: "packages/tool-utils/skill-discovery.ts"

  # ──────────────────────────────────────────────────────────────────────
  # Feature: Terminal UI
  # Package: packages/tui
  # ──────────────────────────────────────────────────────────────────────
  - slug: terminal-ui
    title: "Terminal UI"
    action: add
    story: >
      Terminal output formatting: ANSI color support detection, wordmark/banner
      generation, interactive prompt helpers (via @inquirer/prompts), welcome
      screen animation, and selection screen. After refactoring, also provides
      structured output functions (info/warn/error + --json mode).
    submodules:
      - slug: terminal-detection
        title: "Terminal Capability Detection"
        refs:
          - "packages/tui/terminal.ts"
        functions:
          - name: isInteractive
            file: "packages/tui/terminal.ts"
          - name: supportsColor
            file: "packages/tui/terminal.ts"
          - name: supportsAnimation
            file: "packages/tui/terminal.ts"
          - name: color
            file: "packages/tui/terminal.ts"

      - slug: banner-display
        title: "Banner & Welcome Screen"
        refs:
          - "packages/tui/banner.ts"
        functions:
          - name: buildBanner
            file: "packages/tui/banner.ts"
          - name: buildWordmark
            file: "packages/tui/banner.ts"
          - name: buildWelcomeScreen
            file: "packages/tui/banner.ts"
          - name: animateWelcomeScreen
            file: "packages/tui/banner.ts"
          - name: renderSelectionScreen
            file: "packages/tui/banner.ts"

      - slug: interactive-prompts
        title: "Interactive Prompts"
        refs:
          - "packages/tui/prompts.ts"
        functions:
          - name: promptForModes
            file: "packages/tui/prompts.ts"
          - name: promptYesNo
            file: "packages/tui/prompts.ts"

# ────────────────────────────────────────────────────────────────────────
# Cross-feature edges (call / data-flow / event)
# These represent the inter-package dependency graph (immutable boundaries).
# ────────────────────────────────────────────────────────────────────────
edges:
  - id: cli-edge-001
    from:
      feature: cli-dispatch
      submodule: arg-parser
    to:
      feature: tool-registry
      submodule: registry-core
    kind: call
    label: "run() calls runTool() in registry"

  - id: cli-edge-002
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: banner-display
    kind: call
    label: "printSummary/buildWelcomeScreen uses banner"

  - id: cli-edge-003
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: interactive-prompts
    kind: call
    label: "confirmInstall/promptSymlinkChoice uses prompts"

  - id: cli-edge-004
    from:
      feature: cli-dispatch
      submodule: help-builder
    to:
      feature: terminal-ui
      submodule: banner-display
    kind: call
    label: "buildHelpText uses buildBanner for header"

  - id: cli-edge-005
    from:
      feature: cli-dispatch
      submodule: help-builder
    to:
      feature: tool-registry
      submodule: formatter
    kind: call
    label: "buildHelpText uses formatToolList"

  - id: cli-edge-006
    from:
      feature: cli-dispatch
      submodule: tool-discovery
    to:
      feature: tool-registry
      submodule: registry-core
    kind: call
    label: "registerAllTools calls registerTool"

  - id: cli-edge-007
    from:
      feature: cli-dispatch
      submodule: update-checker
    to:
      feature: terminal-ui
      submodule: terminal-detection
    kind: call
    label: "shouldSkipUpdateCheck uses isInteractive"

  - id: cli-edge-008
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: terminal-ui
      submodule: terminal-detection
    kind: call
    label: "printSummary uses supportsColor"

  - id: cli-edge-009
    from:
      feature: cli-dispatch
      submodule: installer-core
    to:
      feature: tool-utils
      submodule: skill-discovery
    kind: call
    label: "listSkillNames/installLinks uses iterSkillDirs (indirect)"
