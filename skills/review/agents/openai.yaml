interface:
  display_name: "Review Spec Related Changes"
  short_description: "Review spec-backed changes for business-goal completion and code-practice risks"
  default_prompt: "Use review to read the specified SPEC.md, parse each requirement, locate the relevant implementation code, and review it across six dimensions: hallucinated code, redundant code, spec deviation, spec omission, architecture defect, and performance concern. Analyze cross-requirement interactions, then produce REPORT.md with a verdict (Ready to Merge / Needs Attention / Needs Work), requirement status summary, and findings sorted P0-P3. The report must contain findings only — no fix suggestions."
