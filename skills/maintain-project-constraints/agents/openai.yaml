interface:
  display_name: 'Maintain Project Constraints'
  short_description: 'Create and maintain AGENTS.md/CLAUDE.md at root and per-module levels with business goals, commands, doc index, and non-violable rules'
  default_prompt: 'Use $maintain-project-constraints to read the codebase or existing project docs, extract prohibitions from git history/issues/CI, discover sub-modules (crates, packages, etc.), then write or update AGENTS.md and CLAUDE.md at both root and per-module level. Root files follow the three-section format (Common Dev Commands, Business Goals, Documentation Index) plus Prohibitions. Per-module files follow the simpler MODULE DESCRIPTION / MODULE FILE LIST / RULES SHOULD NOT BE VIOLATED format. Note the role split: AGENTS.md targets non-Claude agents (Codex) — use agent-neutral language, no platform-specific syntax. CLAUDE.md targets Claude Code — can include Claude-specific features (hooks, scheduled tasks, cowork, MCP). Verify every rule has supporting evidence from the codebase or project history.'
