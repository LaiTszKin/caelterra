interface:
  display_name: 'update-project-html'
  short_description: 'Refresh the project HTML architecture atlas to reflect the latest code changes via `apltk architecture`'
  default_prompt: >-
    Use $update-project-html. Semantic rules + acceptance criteria live in $init-project-html SKILL.md; **exact verb/subverb/flag spelling MUST come from `apltk architecture --help`** — never memorize commands from prose.
    NEVER hand-edit `resources/project-architecture/**/*.html`. State is YAML under `resources/project-architecture/atlas/`; every mutation goes through the CLI; the renderer owns layout, CSS, ARIA, pan/zoom on macro + sub-module dataflow SVGs.
    STEP 1 — open the current atlas index + per-feature YAMLs (only affected features — context economy); if no atlas exists, redirect to $init-project-html. STEP 2 — measure architecture drift: compare atlas entries against actual codebase structure. STEP 3 — resolve the diff scope explicitly: working tree + staged (`git diff --stat` + `git diff --cached --stat`) by default, or `git diff --stat <base>..HEAD` when the user names a ref. Filter out non-architecture changes (formatting, config-only, test-only, comments). Print the chosen command(s) before delegating. STEP 4 — map filtered diff hunks to affected features using existing per-feature YAML + folder layout; record path → feature mapping.
    **Subagents only:** dispatch ONE write-capable subagent per AFFECTED feature; each deep-reads only its own changed files and declares EVERY intra-feature mutation (`feature`/`submodule`/`function`/`variable`/`dataflow`/`error`/intra-feature `edge` add|set|remove|reorder) via `apltk architecture` (NO `--spec` — this is the base atlas). Each returns ONLY (i) sub-module change list and (ii) outbound boundary deltas for OTHER features.
    **HARD GATE:** main agent MUST wait until EVERY subagent finishes before declaring ANY cross-feature `edge`, shared `meta` that stitches multiple features, or `actor` that exists only for cross-feature context. Then `apltk architecture render` (if subagents used `--no-render`) and `apltk architecture validate`. After update, re-measure drift to confirm it is within acceptable range.
    Sub-module pages stay self-only — cross-boundary behavior is ALWAYS `edge` with kind call|return|data-row|failure. Internal `dataflow` steps may reference a declared function plus reads/writes of declared variables on the SAME sub-module or validate fails.
    Anchor every mutation to the actual diff; preserve existing atlas structure for parts the diff did not touch; for spec-driven overlays use $spec-to-project-html instead and for first-time bootstrap use $init-project-html. Report completion only after validate is OK; cite chosen diff scope, per-feature mutation counts, filtered-out diff buckets, drift before/after, and the location of the rendered atlas.
