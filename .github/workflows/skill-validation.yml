name: Skill Metadata Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build
      - name: Lint check
        run: pnpm lint --cache
      - name: Format check
        run: pnpm format:check

      - name: Validate SKILL.md frontmatter
        run: node dist/bin/apollo-toolkit.js validate-skill-frontmatter

  validate-skill-description-length:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build
      - name: Lint check
        run: pnpm lint --cache
      - name: Format check
        run: pnpm format:check

      - name: Validate SKILL.md description length
        run: node dist/bin/apollo-toolkit.js validate-skill-frontmatter

  validate-openai-agent-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm run build
      - name: Lint check
        run: pnpm lint --cache
      - name: Format check
        run: pnpm format:check

      - name: Validate agents/openai.yaml
        run: node dist/bin/apollo-toolkit.js validate-openai-agent-config
