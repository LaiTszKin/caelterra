name: Test

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Lint check
        run: pnpm lint --cache
      - name: Format check
        run: pnpm format:check
      # Runs bash scripts/test.sh with COVERAGE=true for coverage reporting.
      # Uses shell:bash for Windows compatibility (Git Bash from Git for Windows).
      # Coverage thresholds enforced via run_coverage_group in scripts/test.sh.
      # Group 1 (test/): 75/60/65, Group 2 (packages/): 15/60/40, Combined: >= 65%.
      # Node 22+ with --experimental-test-coverage.
      - name: Run tests with coverage
        shell: bash
        run: bash scripts/test.sh
        env:
          COVERAGE: 'true'
